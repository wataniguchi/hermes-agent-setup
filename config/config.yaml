# Hermes Agent config — copy to ~/.hermes/config.yaml
#
# Treat this file as Hermes-managed going forward — if you edit it by hand,
# prefer `hermes dashboard` or letting Hermes itself write changes where
# possible, since the exact schema (and _config_version) may shift between
# releases.

model:
  provider: custom
  default: gpt-oss:120b-64k
  base_url: http://localhost:11434/v1
  # api_key / context_length intentionally omitted — local unauthenticated
  # endpoint, context auto-detected.
  #
  # gpt-oss:120b-64k (OpenAI, Apache 2.0) replaced gemma4:26b as primary.
  # Reasoning: gemma4:26b showed a repeated pattern of narrating an action
  # ("I will now...", "scanning for...") without the corresponding tool
  # call actually happening, and of substituting raw extracted text for a
  # genuine summary under task complexity — both consistent with published
  # reward-hacking research showing this varies significantly by model and
  # post-training approach, not primarily a sampling/temperature issue.
  # gpt-oss:120b is classified "agent-native" (tool-use trained as a
  # first-class objective) in independent benchmarking, unlike gemma4:26b's
  # "general-purpose, edge-tuned" positioning, and it resolved both failure
  # patterns cleanly in testing.
  #
  # The -64k tag (not the model's native 131072 context) is a deliberate
  # memory trade-off: at 131072, Ollama reserves context per parallel slot
  # (effectively 3x at OLLAMA_NUM_PARALLEL=3), which left only ~9GB free
  # system-wide on a 128GB machine — not enough headroom for gemma4:e4b to
  # coexist without eviction. At 65536, the same combination left ~39GB
  # free at rest, confirmed genuinely coexisting under real 3-way
  # concurrent load (validated via `ollama ps` + `sysctl vm.swapusage`,
  # not just memory totals — swap stayed near-zero throughout).
  #
  # Create this tag if it doesn't exist yet:
  #   ollama run gpt-oss:120b
  #   >>> /set parameter num_ctx 65536
  #   >>> /save gpt-oss:120b-64k
  #   >>> /bye

# Subagent delegation. Both primary and fast model are served by the same
# Ollama instance — unlike a per-model-process backend, one endpoint here
# covers both; only the model name differs.
delegation:
  model: gemma4:e4b
  base_url: http://localhost:11434/v1
  max_concurrent_children: 3

# Real Discord config shape (confirmed against cli-config.yaml.dist).
discord:
  require_mention: true
  auto_thread: true
  history_backfill: true
  history_backfill_limit: 50
  reactions: true

# Sandboxed filesystem + shell access for subagents. All terminal, file,
# and execute calls (from the primary and any delegate_task subagent)
# route through this one Docker container, so the mount permissions below
# are what actually enforce read-only vs. read-write — not which toolsets
# a given delegate_task call was given.
terminal:
  backend: docker
  # Custom image (docker/hermes-sandbox.Dockerfile), extends the stock
  # nikolaik/python-nodejs image with pypdf/pdfplumber baked in — see
  # scripts/build-sandbox-image.sh. Avoids needing to manually
  # `docker exec -u root pip install ...` into every freshly-created
  # container, which only ever persisted for that one container's
  # lifetime anyway.
  docker_image: "hermes-sandbox:latest"

  docker_volumes:
    # Read-only source documents — one line per directory. Docker's
    # kernel-level :ro mount blocks writes regardless of what any
    # subagent attempts.
    - "/path/to/host/docs-collection-1:/corpus/collection-1:ro"
    - "/path/to/host/docs-collection-2:/corpus/collection-2:ro"
    # - "/path/to/host/docs-collection-3:/corpus/collection-3:ro"   # uncomment for a third

    # Deliverables — read-write, persistent across sessions/projects/chats.
    # Persistence here is automatic (plain host directory bind mount),
    # independent of container_persistent below.
    - "/path/to/host/hermes-deliverables:/workspace"

  # Files written to /workspace come out owned by your host user instead
  # of root. Works with hermes-sandbox:latest (built on the same base as
  # the default docker_image) — not with Hermes's own bundled image,
  # which needs to start as root internally.
  docker_run_as_host_user: true

  container_persistent: true   # keep /workspace state across sessions
  container_cpu: 2
  container_memory: 5120       # MB
  container_disk: 51200        # MB

_config_version: 33

group_sessions_per_user: true

# Named custom endpoint — mirrors the primary model above. Appears to be
# needed for the Desktop app's UI (model picker), auto-populated when
# the live config was generated. Keep in sync with model.base_url/default
# if you ever change the primary endpoint.
custom_providers:
  - name: Local (Ollama)
    base_url: http://localhost:11434/v1
    model: gpt-oss:120b-64k

# Mixture-of-Agents intentionally omitted. Confirmed absent from both the
# installer's default template and the live config this was validated
# against, and per NousResearch/hermes-agent issue #38952 (open as of
# June 2026), MoA is currently hardcoded to a fixed set of frontier
# models — not configurable via config.yaml today.

# ── Security ──────────────────────────────────────────────────────────
# Secret redaction is ON by default — strings that look like API keys,
# tokens, and passwords are masked in tool output, logs, and chat
# responses before the model or user ever sees them. Set redact_secrets
# to false to disable (e.g. when developing the redactor itself).
# tirith pre-exec scanning is enabled by default when the tirith binary
# is available. Configure via security.tirith_* keys or env vars
# (TIRITH_ENABLED, TIRITH_BIN, TIRITH_TIMEOUT, TIRITH_FAIL_OPEN).
#
# security:
#   redact_secrets: true
#   tirith_enabled: true
#   tirith_path: "tirith"
#   tirith_timeout: 5
#   tirith_fail_open: true

# ── Fallback Model ────────────────────────────────────────────────────
# Automatic provider failover when primary is unavailable. Real key is
# `fallback_model:` (singular). Uncomment and configure to enable.
# Triggers on rate limits (429), overload (529), service errors (503),
# or connection failures.
#
# Supported providers:
#   openrouter   (OPENROUTER_API_KEY)  — routes to any model
#   openai-codex (OAuth — hermes auth) — OpenAI Codex
#   nous         (OAuth — hermes auth) — Nous Portal
#   zai          (ZAI_API_KEY)         — Z.AI / GLM
#   kimi-coding  (KIMI_API_KEY)        — Kimi / Moonshot
#   kimi-coding-cn (KIMI_CN_API_KEY)   — Kimi / Moonshot (China)
#   minimax      (MINIMAX_API_KEY)     — MiniMax
#   minimax-cn   (MINIMAX_CN_API_KEY)  — MiniMax (China)
#   bedrock      (AWS IAM / boto3)     — AWS Bedrock (Converse API)
#
# For custom OpenAI-compatible endpoints, add base_url and key_env.
#
# fallback_model:
#   provider: openrouter
#   model: anthropic/claude-sonnet-4
